<!DOCTYPE html>
<html>
<head>
    <title>PDF in HTML</title>
</head>
<style>
    .pdf {
        width: 100%;
        aspect-ratio: 4 / 3;
    }
    .pdf,
    html,
    body {
        height: 100%;
        margin: 0;
        padding: 0;
    }
   h1,
    h3 {
        text-align: center;
    }
    h1 {
        color: #72a0c1;
    }
</style>
<body>
        <h1>Mary Elizabeth Mostellar's Resume</h1>
        <h3>Updated May 2026</h3>
        <iframe class="pdf" 
                src="static/resume.pdf"
            width="800" height="500">
        </iframe>
</body>
</html>
